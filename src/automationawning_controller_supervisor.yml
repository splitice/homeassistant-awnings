alias: Awning Controller Supervisor
triggers:
  - trigger: homeassistant
    event: start
actions:
  - variables:
      state_map: {}
      prev_snapshot: {}
      loop_count: 0
  - repeat:
      while:
        - condition: template
          value_template: "{{ true }}"
      sequence:
        - variables:
            loop_count: "{{ loop_count + 1 }}"
            now_mins: "{{ now().hour * 60 + now().minute }}"
            awnings_all: |
              {% set ns = namespace(entities=[]) %}
              {% for dev in label_devices('awning') %}
                {% for ent in device_entities(dev) %}
                  {% if ent.startswith('cover.') %}
                    {% set ns.entities = ns.entities + [ent] %}
                  {% endif %}
                {% endfor %}
              {% endfor %}
              {{ ns.entities }}
            awnings_hot: |
              {% set ns = namespace(entities=[]) %}
              {% for dev in label_devices('awning_hot_close') %}
                {% for ent in device_entities(dev) %}
                  {% if ent.startswith('cover.') %}
                    {% set ns.entities = ns.entities + [ent] %}
                  {% endif %}
                {% endfor %}
              {% endfor %}
              {{ ns.entities }}
            awnings_bedroom: |
              {% set ns = namespace(entities=[]) %}
              {% for dev in label_devices('awning_bedroom') %}
                {% for ent in device_entities(dev) %}
                  {% if ent.startswith('cover.') %}
                    {% set ns.entities = ns.entities + [ent] %}
                  {% endif %}
                {% endfor %}
              {% endfor %}
              {{ ns.entities }}
            motion_sensors: |
              {% set ns = namespace(entities=[]) %}
              {% for dev in label_devices('awning_motion_reset') %}
                {% for ent in device_entities(dev) %}
                  {% if ent.startswith('binary_sensor.') %}
                    {% set ns.entities = ns.entities + [ent] %}
                  {% endif %}
                {% endfor %}
              {% endfor %}
              {{ ns.entities }}
            awnings_n: |
              {% set ns = namespace(entities=[]) %}
              {% for dev in label_devices('awning_n') %}
                {% for ent in device_entities(dev) %}
                  {% if ent.startswith('cover.') %}
                    {% set ns.entities = ns.entities + [ent] %}
                  {% endif %}
                {% endfor %}
              {% endfor %}
              {{ ns.entities }}
            awnings_e: |
              {% set ns = namespace(entities=[]) %}
              {% for dev in label_devices('awning_e') %}
                {% for ent in device_entities(dev) %}
                  {% if ent.startswith('cover.') %}
                    {% set ns.entities = ns.entities + [ent] %}
                  {% endif %}
                {% endfor %}
              {% endfor %}
              {{ ns.entities }}
            awnings_s: |
              {% set ns = namespace(entities=[]) %}
              {% for dev in label_devices('awning_s') %}
                {% for ent in device_entities(dev) %}
                  {% if ent.startswith('cover.') %}
                    {% set ns.entities = ns.entities + [ent] %}
                  {% endif %}
                {% endfor %}
              {% endfor %}
              {{ ns.entities }}
            awnings_w: |
              {% set ns = namespace(entities=[]) %}
              {% for dev in label_devices('awning_w') %}
                {% for ent in device_entities(dev) %}
                  {% if ent.startswith('cover.') %}
                    {% set ns.entities = ns.entities + [ent] %}
                  {% endif %}
                {% endfor %}
              {% endfor %}
              {{ ns.entities }}
            sun_az: "{{ state_attr('sun.sun', 'azimuth') | float(0) }}"
            sun_el: "{{ state_attr('sun.sun', 'elevation') | float(-90) }}"
            min_el: "{{ states('input_number.awning_min_sun_elevation') | float(10) }}"
            band: "{{ states('input_number.awning_exposure_half_band') | float(70) }}"
            today: "{{ now().date().isoformat() }}"
            exposed_n: >
              {% set diff = ((sun_az - 0 + 540) % 360) - 180 %} {{ sun_el >
              min_el and (diff | abs) <= band }}
            exposed_e: >
              {% set diff = ((sun_az - 90 + 540) % 360) - 180 %} {{ sun_el >
              min_el and (diff | abs) <= band }}
            exposed_s: >
              {% set diff = ((sun_az - 180 + 540) % 360) - 180 %} {{ sun_el >
              min_el and (diff | abs) <= band }}
            exposed_w: >
              {% set diff = ((sun_az - 270 + 540) % 360) - 180 %} {{ sun_el >
              min_el and (diff | abs) <= band }}
            exposed_awnings: >
              {% set ns = namespace(out=[]) %} {% if exposed_n %}{% set ns.out =
              ns.out + awnings_n %}{% endif %} {% if exposed_e %}{% set ns.out =
              ns.out + awnings_e %}{% endif %} {% if exposed_s %}{% set ns.out =
              ns.out + awnings_s %}{% endif %} {% if exposed_w %}{% set ns.out =
              ns.out + awnings_w %}{% endif %} {{ ns.out | unique | list }}
            hot_targets: |
              {{ awnings_hot | select('in', exposed_awnings) | list }}
            bedroom_close_targets: >
              {% set ns = namespace(out=[]) %} {% for awning in awnings_bedroom
              %}
                {% set is_exposed = awning in exposed_awnings %}
                {% if not is_exposed or sun_el <= min_el %}
                  {% set ns.out = ns.out + [awning] %}
                {% endif %}
              {% endfor %} {{ ns.out }}
            bedroom_wakeup_targets: >
              {% set ns = namespace(out=[]) %} {% for awning in awnings_bedroom
              %}
                {% set st = state_map.get(awning, {}) %}
                {% set manual_override = st.get('manual_override', false) %}
                {% set pos = state_attr(awning, 'current_position') | int(0) %}
                {% set in_window = namespace(v=false) %}
                {% set dev = device_id(awning) %}

                {% for lbl in labels(dev) %}
                  {% if lbl is match('^bedroom_wakeup_\\d{4}$') %}
                    {% set hh = (lbl[15:17] | int(0)) %}
                    {% set mm = (lbl[17:19] | int(0)) %}
                    {% set wake_mins = hh * 60 + mm %}
                    {% set delta = now_mins - wake_mins %}
                    {% if delta >= 0 and delta < 20 %}
                      {% set in_window.v = true %}
                    {% endif %}
                  {% endif %}
                {% endfor %}

                {% if in_window.v and not manual_override and pos < 11 %}
                  {% set ns.out = ns.out + [awning] %}
                {% endif %}
              {% endfor %} {{ ns.out | unique | list }}
            morning_open_targets: |
              {% set ns = namespace(out=[]) %} {% for awning in awnings_all %}
                {% if awning not in awnings_bedroom and awning not in exposed_awnings and sun_el > 2 %}
                  {% set ns.out = ns.out + [awning] %}
                {% endif %}
              {% endfor %} {{ ns.out }}
            current_snapshot: |
              {% set ns = namespace(out={}) %} {% for awning in awnings_all %}
                {% set ns.out = ns.out | combine({
                  awning: {
                    'state': states(awning),
                    'pos': state_attr(awning, 'current_position')
                  }
                }, recursive=True) %}
              {% endfor %} {{ ns.out }}
            state_map: |
              {% set cur = state_map %} {% set ns = namespace(out=cur) %}
              {% for awning in awnings_all %}
                {% set prev = prev_snapshot.get(awning, {}) %}
                {% set nowv = current_snapshot.get(awning, {}) %}
                {% set st = cur.get(awning, {}) %}

                {% set changed =
                  prev.get('state') != nowv.get('state')
                  or prev.get('pos') != nowv.get('pos') %}

                {% if changed %}
                  {% set expected_state = st.get('last_auto_state') %}
                  {% set expected_day = st.get('last_auto_day') %}
                  {% set auto_match = expected_state is not none and expected_state == nowv.get('state') and expected_day == today %}

                  {% if not auto_match %}
                    {% set pos = nowv.get('pos') %}
                    {% set is_closed =
                      nowv.get('state') in ['closed', 'closing']
                      or (pos is number and pos | int(0) == 0) %}

                    {% set merged = st | combine({
                      'manual_override': true,
                      'closed_until_next_open': is_closed,
                      'last_manual': now().isoformat(),
                      'last_manual_day': today
                    }, recursive=True) %}

                    {% set ns.out = ns.out | combine({ awning: merged }, recursive=True) %}
                  {% endif %}
                {% endif %}
              {% endfor %}
              {{ ns.out }}
            clear_mins:
              "[object Object]": null
        - variables:
            state_map: |
              {% set cur = state_map %} {% set ns = namespace(out=cur) %}
              {% for awning, st in cur.items() %}
                {% if st.get('manual_override', false) %}
                  {% set area = area_name(awning) %}
                  {% set room_motion = motion_sensors
                     | select('in', area_entities(area))
                     | list %}

                  {% if room_motion | count > 0 %}
                    {% set active = room_motion | select('is_state', 'on') | list %}
                    {% if active | count == 0 %}
                      {% set ok = namespace(clear=true) %}
                      {% for m in room_motion %}
                        {% set age = (as_timestamp(now()) - as_timestamp(states[m].last_changed, 0)) / 60 %}
                        {% if age < clear_mins %}
                          {% set ok.clear = false %}
                        {% endif %}
                      {% endfor %}

                      {% if ok.clear %}
                        {% set merged = st | combine({'manual_override': false}, recursive=True) %}
                        {% set ns.out = ns.out | combine({ awning: merged }, recursive=True) %}
                      {% endif %}
                    {% endif %}
                  {% endif %}
                {% endif %}
              {% endfor %}
              {{ ns.out }}
        - variables:
            state_map: |
              {% set cur = state_map %} {% set ns = namespace(out=cur) %}
              {% for awning, st in cur.items() %}
                {% if st.get('closed_until_next_open', false) %}
                  {% set was_manual_day = st.get('last_manual_day') %}
                  {% if was_manual_day != today
                        and awning in morning_open_targets
                        and awning not in awnings_bedroom %}
                    {% set merged = st | combine({
                      'closed_until_next_open': false
                    }, recursive=True) %}
                    {% set ns.out = ns.out | combine({ awning: merged }, recursive=True) %}
                  {% endif %}
                {% endif %}
              {% endfor %}
              {{ ns.out }}
        - choose:
            - conditions:
                - condition: state
                  entity_id: binary_sensor.awning_hot_day
                  state: "on"
                - condition: template
                  value_template: "{{ hot_targets | count > 0 }}"
              sequence:
                - action: script.awning_close_targets
                  data:
                    targets: "{{ hot_targets }}"
                    state_map: "{{ state_map }}"
                - variables:
                    state_map: >
                      {% set cur = state_map %} {% set ns = namespace(out=cur)
                      %} {% for awning in hot_targets %}
                        {% set st = cur.get(awning, {}) %}
                        {% set merged = st | combine({
                          'last_auto_state': 'closing',
                          'last_auto_day': today
                        }, recursive=True) %}
                        {% set ns.out = ns.out | combine({ awning: merged }, recursive=True) %}
                      {% endfor %} {{ ns.out }}
        - choose:
            - conditions:
                - condition: template
                  value_template: "{{ bedroom_wakeup_targets | count > 0 }}"
              sequence:
                - action: cover.set_cover_position
                  target:
                    entity_id: "{{ bedroom_wakeup_targets }}"
                  data:
                    position: 11
                - variables:
                    state_map: >
                      {% set cur = state_map %} {% set ns = namespace(out=cur)
                      %} {% for awning in bedroom_wakeup_targets %}
                        {% set st = cur.get(awning, {}) %}
                        {% set merged = st | combine({
                          'last_auto_state': 'opening',
                          'last_auto_day': today
                        }, recursive=True) %}
                        {% set ns.out = ns.out | combine({ awning: merged }, recursive=True) %}
                      {% endfor %} {{ ns.out }}
        - choose:
            - conditions:
                - condition: template
                  value_template: "{{ bedroom_close_targets | count > 0 }}"
              sequence:
                - action: script.awning_close_targets
                  data:
                    targets: "{{ bedroom_close_targets }}"
                    state_map: "{{ state_map }}"
                - variables:
                    state_map: >
                      {% set cur = state_map %} {% set ns = namespace(out=cur)
                      %} {% for awning in bedroom_close_targets %}
                        {% set st = cur.get(awning, {}) %}
                        {% set merged = st | combine({
                          'last_auto_state': 'closing',
                          'last_auto_day': today
                        }, recursive=True) %}
                        {% set ns.out = ns.out | combine({ awning: merged }, recursive=True) %}
                      {% endfor %} {{ ns.out }}
        - choose:
            - conditions:
                - condition: template
                  value_template: "{{ morning_open_targets | count > 0 }}"
              sequence:
                - action: script.awning_open_targets
                  data:
                    targets: "{{ morning_open_targets }}"
                    state_map: "{{ state_map }}"
                - variables:
                    state_map: >
                      {% set cur = state_map %} {% set ns = namespace(out=cur)
                      %} {% for awning in morning_open_targets %}
                        {% set st = cur.get(awning, {}) %}
                        {% set merged = st | combine({
                          'last_auto_state': 'opening',
                          'last_auto_day': today
                        }, recursive=True) %}
                        {% set ns.out = ns.out | combine({ awning: merged }, recursive=True) %}
                      {% endfor %} {{ ns.out }}
        - variables:
            prev_snapshot: |
              {% set ns = namespace(out={}) %} {% for awning in awnings_all %}
                {% set ns.out = ns.out | combine({
                  awning: {
                    'state': states(awning),
                    'pos': state_attr(awning, 'current_position')
                  }
                }, recursive=True) %}
              {% endfor %} {{ ns.out }}
        - variables:
            has_live_state: >
              {% set found = namespace(v=false) %} {% for awning, st in
              state_map.items() %}
                {% if st.get('manual_override', false) or st.get('closed_until_next_open', false) %}
                  {% set found.v = true %}
                {% endif %}
              {% endfor %} {{ found.v }}
        - choose:
            - conditions:
                - condition: template
                  value_template: "{{ loop_count | int(0) >= 1000 }}"
                - condition: template
                  value_template: "{{ not has_live_state }}"
              sequence:
                - action: automation.trigger
                  target:
                    entity_id: automation.awning_controller_supervisor
                - stop: Restarting daemon to reset loop counter
        - delay:
            hours: 0
            minutes: 1
            seconds: 0
            milliseconds: 0
mode: restart
